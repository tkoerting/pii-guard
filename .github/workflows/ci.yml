name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependencies installieren
        run: |
          pip install -e ".[dev]"
          python -m spacy download de_core_news_lg

      - name: Linting (ruff)
        run: ruff check src/ tests/

      - name: Tests
        run: pytest tests/ -v --tb=short
