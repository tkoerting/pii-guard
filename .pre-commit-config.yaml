repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: pii-guard-check
        name: PII Guard – Config Validation
        entry: pii-guard status --check
        language: python
        pass_filenames: false
        always_run: true
