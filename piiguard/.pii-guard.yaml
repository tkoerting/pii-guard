version: 1
engine:
  languages: ["de", "en"]
  confidence_threshold: 0.7
rules:
  - types: [PASSWORD, API_KEY, CREDIT_CARD, IBAN_CODE]
    action: block
  - types: [PERSON, EMAIL_ADDRESS, PHONE_NUMBER]
    action: auto_mask
  - types: [ORGANIZATION]
    action: warn
allow_list: []
audit:
  enabled: true
  path: .pii-guard/audit.log
docker:
  enabled: true
  host: 127.0.0.1
  port: 4141